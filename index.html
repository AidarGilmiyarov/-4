<!DOCTYPE html>
<html>
  <head>
    <title>Главная страница</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header">
      <div class="header_logo">
        <img class="header_logo_image" src="img/logo.png" alt="logo" wight="32" height="32">foo
      </div>
      <div class="header_menu">
        <a class="header_menu_item" href="#">home</a>
        <a class="header_menu_item" href="#">menu</a>
        <a class="header_menu_item" href="#">contact</a>
        <a class="header_menu_item" href="#">shop</a>
      </div>
      <div class="header_search">
        <div class="header_search_left">
          <img class="header_search_left_image" src="img/Vector.png" alt="search" width="18" height="18"><input class="header_search_left_search" type="text" placeholder="Search">
        </div>
        <div class="header_search_stick"></div>
        <div class="header_search_right">
          <img src="img/Shoppingcart.png" alt="korzina">
          <div class="header_search_right_circle">2</div>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="main_left">
        <div class="main_left_header">
          <div class="main_left_header_left">Fast</div>
          <div class="main_left_header_right">Food Delivery</div>
        </div>
        <div class="main_left_txt">
          <div class="main_left_txt_text">Sed ut perspiciatis unde omnis iste
          natus sit voluptatem accusantium doloremque laudantium</div>
        </div>
        <div class="main_left_buttoms">
          <div class="main_left_buttoms_left">Order Now</div>
          <div class="main_left_buttoms_right">
            <div class="main_left_buttoms_right_buttom"><img class="main_left_buttoms_right_buttom_knopka" src="img/knopka.png" alt="knopka" width="21" height="21"></div>
            <div class="main_left_buttoms_right_word">Watch Video</div>
          </div>
        </div>
        <div class="main_left_footer">
          <div class="main_left_footer_hight">
            <img class="main_left_footer_hight_star" src="img/star.png" alt="star">
            <img class="main_left_footer_hight_star" src="img/star.png" alt="star">
            <img class="main_left_footer_hight_star" src="img/star.png" alt="star">
            <img class="main_left_footer_hight_star" src="img/star.png" alt="star">
            <img class="main_left_footer_hight_star" src="img/star.png" alt="star">
          </div>
          <div class="main_left_footer_middle">5 star rating</div>
          <div class="main_left_footer_low">based on 1788 reviews</div>
        </div>
      </div>
      <div class="main_right"><img class="main_right_img"src="img/menu.png" alt="menu" ></div>
    </div>
  </body>
</html>
